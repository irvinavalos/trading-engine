repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.15
    hooks:
      - id: uv-lock
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format