name: Python Code Quality
on: [push]
jobs:
  lock_file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv lock --locked
  linting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uvx ruff check --exclude "./notebooks" .
  formatting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uvx ruff format --check --exclude "./notebooks" .
  type_checking:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv run pyright .
  build:
    runs-on: [ubuntu-latest]
    needs: [linting, formatting, type_checking]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv build